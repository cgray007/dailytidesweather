name: Export Secrets (one-time)

# TEMPORARY — encrypts the repo's Action secrets with the public key below and
# pushes the ciphertext to a throwaway branch so they can be recovered locally.
# Only the holder of the matching private key can decrypt. Delete after use.

on:
  push:
    paths:
      - ".github/workflows/export_secrets_once.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Encrypt secrets and push to temporary branch
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL:    ${{ secrets.RECIPIENT_EMAIL }}
          TIDE_AGENT_ID:      ${{ secrets.TIDE_AGENT_ID }}
          TIDE_ENV_ID:        ${{ secrets.TIDE_ENV_ID }}
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          cat > public.pem <<'EOF'
          -----BEGIN PUBLIC KEY-----
          MIICIjANBgkqhkiG9w0BAQEFAAOCAg8AMIICCgKCAgEAle2+9HlwmTmNfcHDRnIW
          FV+34Szy/+KZUhXRas08XMIOUZ5nbj/OuNV/w/SR71V+ZcLfv4Lvju3WN5S0+W9V
          uqeCq+LgTXQDg/7QmxHk96xKrtlKe/EpKjKns+RScnZUOZpqMhwprM0kPFCCsGCE
          giUwHPV/vQ87y4mEr9CQZF7a8yYJCOWqGdnjBJEGw//DDhXQb2OJUn/JEA+cTRkj
          JsfNY6ye+9qdSS1VjFcLmuYNh5OFSDi78/dPdSlRMvh8eWF1WMx0fLIgin9NuKTW
          MQJ6fRKiFxvPvp6XQi4VVlboZmwG60XleTx3lqmWJydjHe/eCEKFHb8Own3TkUpj
          iUV3Nik+C1clHeuWL2FUAW32QelgFMdU7g2B1R3c/EQjWRWAx6APiuoho9YOoZPF
          f6//NwY/8fxfjuWd3nzEs4tq+5r0EjkCgadWEaEwYJCa04YWTRESOH6/OWJ6KxSN
          BFD9qnZTYain5expiOOUoHCJ0pJ4kI+U4m7VNqlOkXyrMOP3OwcRlSojuPoRNcLq
          2CBcd2Xg05kXnpehBZcPm/jB3kpe9gMMqJRMcYqUX7YnfENh/nii6uHoPIEdyLbd
          GxJNtlxeKV4OvnHXifpnH0GGYUkHof3Ax131pQheVC6m21jinbb8LW5RKp8xKwXU
          haaouGSQ9RvPrcLx0BCye70CAwEAAQ==
          -----END PUBLIC KEY-----
          EOF
          # strip the leading indentation the heredoc inherited from YAML
          sed -i 's/^          //' public.pem

          jq -n \
            --arg ANTHROPIC_API_KEY  "$ANTHROPIC_API_KEY" \
            --arg GMAIL_ADDRESS      "$GMAIL_ADDRESS" \
            --arg GMAIL_APP_PASSWORD "$GMAIL_APP_PASSWORD" \
            --arg RECIPIENT_EMAIL    "$RECIPIENT_EMAIL" \
            --arg TIDE_AGENT_ID      "$TIDE_AGENT_ID" \
            --arg TIDE_ENV_ID        "$TIDE_ENV_ID" \
            '{ANTHROPIC_API_KEY: $ANTHROPIC_API_KEY,
              GMAIL_ADDRESS: $GMAIL_ADDRESS,
              GMAIL_APP_PASSWORD: $GMAIL_APP_PASSWORD,
              RECIPIENT_EMAIL: $RECIPIENT_EMAIL,
              TIDE_AGENT_ID: $TIDE_AGENT_ID,
              TIDE_ENV_ID: $TIDE_ENV_ID}' > payload.json

          # Hybrid encryption: AES-256 for the payload, RSA-OAEP for the AES key.
          openssl rand -out aes.key 32
          openssl enc -aes-256-cbc -pbkdf2 -in payload.json -out payload.enc -pass file:aes.key
          openssl pkeyutl -encrypt -pubin -inkey public.pem -in aes.key -out aes.key.enc -pkeyopt rsa_padding_mode:oaep
          rm -f payload.json aes.key

          mkdir out && cd out
          git init -q -b secret-export
          cp ../payload.enc ../aes.key.enc .
          git -c user.name=secret-export -c user.email=actions@users.noreply.github.com add .
          git -c user.name=secret-export -c user.email=actions@users.noreply.github.com commit -q -m "encrypted secret export"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" secret-export
